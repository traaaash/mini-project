- name: Deploy E-Commerce Application
  hosts: web
  become: true
  gather_facts: true
  vars:
    app_root: /home/ec2-user/app

  tasks:
    - name: Ensure application directory exists
      file:
        path: "{{ app_root }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    # --- DOCKER INSTALLATION (Amazon Linux 2) ---
    - name: Update all packages
      yum:
        name: '*'
        state: latest

    - name: Install Docker engine from amazon-linux-extras
      shell: "amazon-linux-extras install docker -y"

    - name: Install Docker Compose V2 plugin
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'
        state: present
        force: yes # Ensure we get the latest version

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: true

    - name: Reset connection to apply group changes
      meta: reset_connection

    # --- APPLICATION DEPLOYMENT ---
    - name: Copy application source code
      copy:
        src: ../app/
        dest: "{{ app_root }}/app"
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Copy Docker Compose and Nginx config
      copy:
        src: "{{ item }}"
        dest: "{{ app_root }}/{{ item }}"
        owner: ec2-user
        group: ec2-user
        mode: "0644"
      loop:
        - docker-compose.yml
        - nginx.conf

    - name: Fix ownership before build
      file:
        path: "{{ app_root }}"
        owner: ec2-user
        group: ec2-user
        recurse: yes

    - name: Launch application stack (Nginx, Node, MongoDB)
      shell: "docker-compose up -d --build" # Changed to docker-compose for standalone binary
      args:
        chdir: "{{ app_root }}"
      environment:
        DOCKER_CLIENT_TIMEOUT: 600
        COMPOSE_HTTP_TIMEOUT: 600

    - name: Prune old images to save space
      shell: "docker image prune -f"