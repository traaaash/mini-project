- name: Deploy E-Commerce Application
  hosts: web
  become: true
  gather_facts: true
  vars:
    app_root: /home/ec2-user/app

  tasks:
    - name: Ensure application directory exists
      file:
        path: "{{ app_root }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Install Docker and Plugins on Debian/Ubuntu
      apt:
        name:
          - docker.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install Docker engine on RedHat/Amazon Linux
      dnf:
        name: docker
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Ensure Docker CLI plugin directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: "{{ 'ec2-user' if '/home/ec2-user' in item else 'root' }}"
      loop:
        - /usr/libexec/docker/cli-plugins
        - /home/ec2-user/.docker/cli-plugins
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install Docker Buildx plugin (Latest v0.17.1)
      get_url:
        url: https://github.com/docker/buildx/releases/download/v0.17.1/buildx-v0.17.1.linux-amd64
        dest: /usr/libexec/docker/cli-plugins/docker-buildx
        mode: '0755'
        force: yes
      when: ansible_facts['os_family'] == "RedHat"

    - name: Link Buildx to User directory for high priority
      file:
        src: /usr/libexec/docker/cli-plugins/docker-buildx
        dest: "/home/ec2-user/.docker/cli-plugins/docker-buildx"
        state: link
        owner: ec2-user
        group: ec2-user
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install Docker Compose V2 plugin
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/libexec/docker/cli-plugins/docker-compose
        mode: '0755'
        force: yes
      when: ansible_facts['os_family'] == "RedHat"

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: true

    - name: Copy application files
      copy:
        src: ../app/
        dest: "{{ app_root }}/app"
        owner: ec2-user
        group: ec2-user
        mode: "0755"
        remote_src: no

    - name: Copy Docker Compose configuration
      copy:
        src: docker-compose.yml
        dest: "{{ app_root }}/docker-compose.yml"
        owner: ec2-user
        group: ec2-user
        mode: "0644"

    - name: Copy Nginx configuration
      copy:
        src: nginx.conf
        dest: "{{ app_root }}/nginx.conf"
        owner: ec2-user
        group: ec2-user
        mode: "0644"

    - name: Ensure application ownership
      file:
        path: "{{ app_root }}"
        owner: ec2-user
        group: ec2-user
        recurse: yes

    - name: Launch application with Docker Compose
      shell: "docker compose up -d --build"
      args:
        chdir: "{{ app_root }}"
      environment:
        DOCKER_CLIENT_TIMEOUT: 600
        COMPOSE_HTTP_TIMEOUT: 600