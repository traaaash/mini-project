- name: Deploy E-Commerce Application
  hosts: web
  become: true
  gather_facts: true
  vars:
    app_root: /home/ec2-user/app

  tasks:
    - name: Ensure application directory exists
      file:
        path: "{{ app_root }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Install Docker package on Debian/Ubuntu
      apt:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install Docker engine on RedHat/Amazon Linux
      yum:
        name: docker
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install Docker Compose binary on RedHat/Amazon Linux
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'
      when: ansible_facts['os_family'] == "RedHat"

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: true

    - name: Copy application files
      copy:
        src: ../app/
        dest: "{{ app_root }}/app"
        owner: ec2-user
        group: ec2-user
        mode: "0755"
        remote_src: no
        recurse: yes

    - name: Copy Docker Compose configuration
      copy:
        src: docker-compose.yml
        dest: "{{ app_root }}/docker-compose.yml"
        owner: ec2-user
        group: ec2-user
        mode: "0644"

    - name: Copy Nginx configuration
      copy:
        src: nginx.conf
        dest: "{{ app_root }}/nginx.conf"
        owner: ec2-user
        group: ec2-user
        mode: "0644"

    - name: Ensure application ownership
      file:
        path: "{{ app_root }}"
        owner: ec2-user
        group: ec2-user
        recurse: yes

    - name: Launch application with Docker Compose
      shell: |
        if [ -f /usr/local/bin/docker-compose ]; then
          /usr/local/bin/docker-compose up -d
        elif command -v docker-compose >/dev/null 2>&1; then
          docker-compose up -d
        else
          docker compose up -d
        fi
      args:
        chdir: "{{ app_root }}"