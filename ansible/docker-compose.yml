version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: ../app
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://mongodb:27017/ecommerce
    depends_on:
      - mongodb

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mongo_data:
