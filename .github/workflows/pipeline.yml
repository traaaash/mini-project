name: Full DevOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    outputs:
      bastion_ip: ${{ steps.export_ips.outputs.bastion_ip }}
      private_ips: ${{ steps.export_ips.outputs.private_ips }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - id: export_ips
        name: Export Bastion and Private IPs
        run: |
          BASTION_IP=$(terraform output -raw bastion_public_ip)
          PRIVATE_IPS=$(terraform output -json web_instance_private_ips | jq -r '.[]' | tr '\n' ',' | sed 's/,$//')
          echo "bastion_ip=$BASTION_IP" >> $GITHUB_OUTPUT
          echo "private_ips=$PRIVATE_IPS" >> $GITHUB_OUTPUT

  ansible:
    name: Configure Servers via Bastion
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Ansible and jq
        run: |
          sudo apt-get update
          # 1. Forcefully remove any system-installed Ansible
          sudo apt-get remove -y ansible || true
          sudo apt-get install -y jq pipx
          # 2. Force pipx to install exactly v9.5.1 and overwrite any existing links
          pipx install --force ansible==9.5.1
          # 3. Reload the path so the runner immediately recognizes the new pipx Ansible
          export PATH="/home/runner/.local/bin:$PATH"
          ansible-galaxy collection install community.docker 

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Debug SSH Connection to Bastion
        run: |
          BASTION_IP="${{ needs.terraform.outputs.bastion_ip }}"
          echo "Bastion IP: $BASTION_IP"
          echo "Attempting direct SSH connection to Bastion..."
          ssh -A -o StrictHostKeyChecking=no ec2-user@$BASTION_IP "echo 'Successfully connected to bastion!'"

      - name: Generate Inventory for Bastion ProxyJump
        run: |
          BASTION_IP="${{ needs.terraform.outputs.bastion_ip }}"
          PRIVATE_IPS="${{ needs.terraform.outputs.private_ips }}"

          echo "[web]" > inventory.ini
          for ip in $(echo "$PRIVATE_IPS" | tr ',' ' '); do
            echo "$ip" >> inventory.ini
          done

          echo "[web:vars]" >> inventory.ini
          echo "ansible_user=ec2-user" >> inventory.ini
          echo "ansible_python_interpreter=/usr/bin/python3.8" >> inventory.ini
          echo "ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand=\"ssh -A -W %h:%p -q ec2-user@$BASTION_IP\"'" >> inventory.ini

      - name: Wait for EC2 Instances to Initialize
        run: |
          BASTION_IP="${{ needs.terraform.outputs.bastion_ip }}"
          PRIVATE_IPS="${{ needs.terraform.outputs.private_ips }}"
          
          echo "Waiting for background boot processes to finish..."
          for ip in $(echo "$PRIVATE_IPS" | tr ',' ' '); do
            echo "Checking background tasks on $ip..."
            ssh -o StrictHostKeyChecking=no -J ec2-user@$BASTION_IP ec2-user@$ip 'sudo cloud-init status --wait || true'
            
            echo "Installing Python 3.8 for modern Ansible compatibility..."
            ssh -o StrictHostKeyChecking=no -J ec2-user@$BASTION_IP ec2-user@$ip 'sudo amazon-linux-extras install python3.8 -y'
          done

      - name: Run Ansible Deployment
        env:
          ANSIBLE_PIPELINING: "true"
          ANSIBLE_HOST_KEY_CHECKING: "false"
        # Force the runner to use the pipx installation path
        run: /home/runner/.local/bin/ansible-playbook -i inventory.ini ansible/deploy.yml

  destroy:
    name: Destroy Infrastructure
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Destroy
        run: terraform destroy -auto-approve