name: Full DevOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    outputs:
      bastion_ip: ${{ steps.export_ips.outputs.bastion_ip }}
      private_ips: ${{ steps.export_ips.outputs.private_ips }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - id: export_ips
        name: Export Bastion and Private IPs
        run: |
          BASTION_IP=$(terraform output -raw bastion_public_ip)
          PRIVATE_IPS=$(terraform output -json web_instance_private_ips | jq -r '.[]' | tr '\n' ',' | sed 's/,$//')
          echo "bastion_ip=$BASTION_IP" >> $GITHUB_OUTPUT
          echo "private_ips=$PRIVATE_IPS" >> $GITHUB_OUTPUT

  ansible:
    name: Configure Servers via Bastion
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Ansible and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible jq

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Generate Inventory for Bastion ProxyJump
        run: |
          BASTION_IP="${{ needs.terraform.outputs.bastion_ip }}"
          PRIVATE_IPS="${{ needs.terraform.outputs.private_ips }}"

          echo "[web]" > inventory.ini
          for ip in $(echo "$PRIVATE_IPS" | tr ',' ' '); do
            echo "$ip" >> inventory.ini
          done

          echo "[web:vars]" >> inventory.ini
          echo "ansible_user=ec2-user" >> inventory.ini
          echo "ansible_ssh_private_key_file=key.pem" >> inventory.ini
          echo "ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand=\"ssh -W %h:%p -q ec2-user@$BASTION_IP -i key.pem\"'" >> inventory.ini

      - name: Run Ansible Deployment
        run: ansible-playbook -i inventory.ini ansible/deploy.yml

  destroy:
    name: Destroy Infrastructure
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Destroy
        run: terraform destroy -auto-approve